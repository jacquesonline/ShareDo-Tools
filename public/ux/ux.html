<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Monitor - ShareDo Tools</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/shared/style.css">
<link rel="stylesheet" href="/ux/ux-style.css">
</head>
<body>

<div id="globalError" class="usd-global-error" style="display:none"></div>

<!-- Header -->
<div class="usd-header">
    <div class="usd-header__left">
        <span class="usd-header__title">ShareDo Tools</span>
        <nav class="usd-nav" id="mainNav"></nav>
        <select class="usd-header__env-select" id="envSelect"></select>
        <span class="usd-header__host" id="hostLabel">--</span>
        <span class="usd-header__cookie-status" id="cookieStatus"></span>
    </div>
    <div class="usd-header__right">
    </div>
</div>

<!-- UX Monitor body -->
<div class="ux-body">

    <!-- Controls bar -->
    <div class="ux-controls">
        <div class="ux-controls__title">
            <span class="ux-controls__icon"><span class="fa fa-tachometer"></span></span>
            <span class="ux-controls__name">UX Monitor</span>
            <span class="ux-controls__info" title="API probe and page load performance data. Click a data point on a page check chart to view the AJAX request breakdown. Shift+Drag to zoom, Alt+Drag to pan, Ctrl+Scroll to zoom. Ctrl/Shift/Cmd + click a legend item to solo it."><span class="fa fa-info-circle"></span></span>
        </div>
        <div class="ux-controls__left">
            <span class="ux-controls__env-label" id="uxEnvLabel">--</span>
        </div>
        <button class="usd-btn usd-btn--primary" id="uxLoadBtn"><span class="fa fa-refresh"></span> Load</button>
        <button class="usd-btn ux-file-btn" id="uxFileBtn" title="Load UX metrics from local JSONL file(s). Accepted: ux-pages.jsonl, ux-api.jsonl, with optional -backup or env suffix."><span class="fa fa-folder-open-o"></span></button>
        <input type="file" id="uxFileInput" accept=".jsonl" multiple style="display:none" />
        <div class="ux-file-chips" id="uxFileChips" style="display:none"></div>
        <button class="usd-btn ux-file-clear-btn" id="uxFileClearBtn" style="display:none">Clear Files</button>
        <div class="ux-controls__right" id="uxStorageInfo"></div>
    </div>

    <!-- Time range controls -->
    <div class="ux-time-bar">
        <div class="ux-time-bar__quick">
            <button class="usd-btn ux-quick-btn ux-quick-btn--active" data-range="1">1h</button>
            <button class="usd-btn ux-quick-btn" data-range="6">6h</button>
            <button class="usd-btn ux-quick-btn" data-range="24">24h</button>
            <button class="usd-btn ux-quick-btn" data-range="72">3d</button>
            <button class="usd-btn ux-quick-btn" data-range="168">7d</button>
            <button class="usd-btn ux-quick-btn" data-range="0">All</button>
        </div>
        <div class="ux-time-bar__sep"></div>
        <div class="ux-time-bar__nav">
            <button class="usd-btn ux-nav-btn" id="uxNavPrev" title="Step backward"><span class="fa fa-chevron-left"></span></button>
            <button class="usd-btn ux-nav-btn" id="uxNavNext" title="Step forward"><span class="fa fa-chevron-right"></span></button>
        </div>
        <div class="ux-time-bar__sep"></div>
        <div class="ux-time-bar__dates">
            <label class="ux-controls__label">From</label>
            <input type="datetime-local" class="ux-date-input" id="uxDateFrom" />
        </div>
        <div class="ux-time-bar__dates">
            <label class="ux-controls__label">To</label>
            <input type="datetime-local" class="ux-date-input" id="uxDateTo" />
        </div>
    </div>

    <!-- Storage warning -->
    <div class="ux-warning" id="uxWarning" style="display:none">
        <span class="fa fa-exclamation-triangle"></span>
        <span id="uxWarningText"></span>
    </div>

    <!-- Summary cards (per-URL overview, rendered by ux.js) -->
    <div class="ux-summary" id="uxSummary" style="display:none"></div>

    <!-- Comparative chart (Tier 2) -->
    <div class="ux-chart-panel ux-chart-panel--collapsible" id="uxComparePanel">
        <div class="ux-chart-panel__header">
            <span class="ux-chart-panel__chevron fa fa-chevron-down"></span>
            <span class="fa fa-line-chart"></span> Page Performance Comparison
            <span class="ux-chart-panel__count" id="uxCompareCount"></span>
            <div class="ux-chart-panel__actions" id="uxCompareActions">
                <select class="ux-compare-metric-select" id="uxCompareMetric">
                    <option value="lcp" selected>LCP</option>
                    <option value="fcp">FCP</option>
                    <option value="tti">TTI</option>
                    <option value="totalLoadMs">Total Load</option>
                    <option value="ajaxSlowest">Slowest AJAX</option>
                </select>
                <button class="usd-btn ux-chart-panel__toggle" id="uxCompareResetZoom" title="Reset zoom" style="display:none"><span class="fa fa-search-minus"></span></button>
                <button class="usd-btn ux-chart-panel__toggle" id="uxCompareShowAll" title="Show all"><span class="fa fa-eye"></span></button>
                <button class="usd-btn ux-chart-panel__toggle" id="uxCompareHideAll" title="Hide all"><span class="fa fa-eye-slash"></span></button>
            </div>
        </div>
        <div class="ux-chart-panel__body">
            <div class="ux-chart-empty" id="uxCompareEmpty">Load data to view Page Performance Comparison</div>
            <canvas id="uxChartCompare" style="display:none"></canvas>
        </div>
    </div>

    <!-- Detail filter indicator -->
    <div class="ux-detail-filter" id="uxDetailFilter" style="display:none"></div>

    <!-- Detail charts -->
    <div class="ux-charts">

        <!-- Web Vitals -->
        <div class="ux-chart-panel ux-chart-panel--collapsible ux-chart-panel--collapsed">
            <div class="ux-chart-panel__header">
                <span class="ux-chart-panel__chevron fa fa-chevron-down"></span>
                <span class="fa fa-heartbeat"></span> Web Vitals Over Time
                <span class="ux-chart-panel__count" id="uxVitalsCount"></span>
                <div class="ux-chart-panel__actions" id="uxVitalsActions" style="display:none">
                    <button class="usd-btn ux-chart-panel__toggle" id="uxVitalsResetZoom" title="Reset zoom" style="display:none"><span class="fa fa-search-minus"></span></button>
                    <button class="usd-btn ux-chart-panel__toggle" id="uxVitalsShowAll" title="Show all"><span class="fa fa-eye"></span></button>
                    <button class="usd-btn ux-chart-panel__toggle" id="uxVitalsHideAll" title="Hide all"><span class="fa fa-eye-slash"></span></button>
                </div>
            </div>
            <div class="ux-chart-panel__body">
                <div class="ux-chart-empty" id="uxVitalsEmpty">Load data to view Web Vitals</div>
                <canvas id="uxChartVitals" style="display:none"></canvas>
            </div>
        </div>

        <!-- API Probes -->
        <div class="ux-chart-panel ux-chart-panel--collapsible">
            <div class="ux-chart-panel__header">
                <span class="ux-chart-panel__chevron fa fa-chevron-down"></span>
                <span class="fa fa-exchange"></span> API Probe Response Times
                <span class="ux-chart-panel__count" id="uxProbesCount"></span>
                <div class="ux-chart-panel__actions" id="uxProbesActions" style="display:none">
                    <button class="usd-btn ux-chart-panel__toggle" id="uxProbesResetZoom" title="Reset zoom" style="display:none"><span class="fa fa-search-minus"></span></button>
                    <button class="usd-btn ux-chart-panel__toggle" id="uxProbesShowAll" title="Show all"><span class="fa fa-eye"></span></button>
                    <button class="usd-btn ux-chart-panel__toggle" id="uxProbesHideAll" title="Hide all"><span class="fa fa-eye-slash"></span></button>
                </div>
            </div>
            <div class="ux-chart-panel__body">
                <div class="ux-chart-empty" id="uxProbesEmpty">Load data to view API Probes</div>
                <canvas id="uxChartProbes" style="display:none"></canvas>
            </div>
        </div>

    </div>

    <!-- Manual controls -->
    <div class="ux-manual">
        <div class="ux-manual__header"><span class="fa fa-terminal"></span> Manual Checks</div>
        <div class="ux-manual__controls">
            <button class="usd-btn" id="uxRunProbesBtn"><span class="fa fa-play"></span> Run Probes</button>
            <span class="ux-manual__sep"></span>
            <button class="usd-btn" id="uxRunAllPagesBtn"><span class="fa fa-files-o"></span> Run All Targets</button>
            <span class="ux-manual__sep"></span>
            <input type="text" class="ux-manual__input" id="uxPageUrl" placeholder="URL or path (default: /)" />
            <button class="usd-btn" id="uxRunPageBtn"><span class="fa fa-globe"></span> Run Page Check</button>
        </div>
    </div>

</div>

<!-- AJAX detail modal -->
<div class="ux-modal-overlay" id="uxAjaxModal" style="display:none">
    <div class="ux-modal">
        <div class="ux-modal__header">
            <h2 class="ux-modal__title">Page Check Detail</h2>
            <span class="ux-modal__context" id="uxAjaxContext"></span>
            <button class="ux-modal__close" id="uxAjaxModalClose"><span class="fa fa-times"></span></button>
        </div>
        <div class="ux-modal__summary" id="uxAjaxSummary"></div>
        <div class="ux-modal__body" id="uxAjaxBody"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/4.1.0/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.2.0/chartjs-plugin-zoom.min.js"></script>
<script src="/shared/shared.js"></script>
<script src="/ux/ux.js"></script>
</body>
</html>
